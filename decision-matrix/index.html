<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Decision Matrix — матрица решений</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #08090c;
      --surface: #101218;
      --surface-2: #161a22;
      --border: rgba(255,255,255,0.06);
      --text: #e4e4e7;
      --muted: #52525b;
      --o: #f97316;
      --g: #22c55e;
      --b: #3b82f6;
      --p: #a855f7;
      --r: #ef4444;
      --glow: rgba(249,115,22,0.3);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
    .app{min-height:100vh;padding:1rem;max-width:1400px;margin:0 auto}
    .header{margin-bottom:1.5rem}
    .header h1{font-size:1.25rem;font-weight:600;color:var(--o)}
    .header p{font-size:0.8rem;color:var(--muted);margin-top:0.25rem}

    .grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(400px,1.2fr);gap:1rem}
    @media(max-width:900px){.grid{grid-template-columns:1fr}}

    .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem;overflow:hidden}
    .label{font-size:0.6rem;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:0.75rem}

    /* Matrix table */
    .matrix-wrap{overflow-x:auto}
    .matrix{table-layout:fixed;width:100%;font-size:0.75rem;border-collapse:collapse}
    .matrix th,.matrix td{border:1px solid var(--border);padding:0.35rem;text-align:center}
    .matrix th{background:var(--surface-2);color:var(--muted);font-weight:500}
    .matrix th.opt{min-width:80px}
    .matrix th.crit{min-width:60px}
    .matrix input{width:100%;max-width:48px;padding:0.25rem;font-size:0.75rem;text-align:center;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text)}
    .matrix input:focus{outline:none;border-color:var(--o);box-shadow:0 0 0 2px var(--glow)}
    .matrix .weight input{background:var(--surface-2)}
    .matrix .total{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--o);background:rgba(249,115,22,0.08)}
    .matrix .rank{font-size:0.65rem;color:var(--muted)}

    /* Editable headers */
    .matrix th input{font-size:0.7rem;max-width:100%;font-weight:500;color:var(--text)}
    .matrix th input::placeholder{color:var(--muted)}

    /* Results panel */
    .results{display:flex;flex-direction:column;gap:1rem}
    .rank-list{display:flex;flex-direction:column;gap:0.5rem}
    .rank-item{display:flex;align-items:center;gap:1rem;padding:0.75rem;background:var(--surface-2);border-radius:8px;border-left:4px solid var(--o)}
    .rank-item:nth-child(1){border-color:var(--g)}
    .rank-item:nth-child(2){border-color:var(--b)}
    .rank-item:nth-child(3){border-color:var(--p)}
    .rank-item .pos{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:1.2rem;color:var(--muted);min-width:2rem}
    .rank-item .name{flex:1;font-weight:500}
    .rank-item .score{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--o)}

    /* Bar comparison */
    .bar-compare{display:flex;flex-direction:column;gap:0.5rem}
    .bar-row{display:flex;align-items:center;gap:0.75rem}
    .bar-row .name{min-width:6rem;font-size:0.8rem;overflow:hidden;text-overflow:ellipsis}
    .bar-row .track{flex:1;height:20px;background:var(--surface-2);border-radius:4px;overflow:hidden;position:relative}
    .bar-row .fill{height:100%;border-radius:4px;transition:width 0.5s ease;min-width:2px}
    .bar-row .val{font-family:'JetBrains Mono',monospace;font-size:0.75rem;min-width:3rem;text-align:right}

    /* Radar */
    .radar-wrap{position:relative;width:100%;aspect-ratio:1;max-width:280px;margin:0 auto}
    .radar-wrap svg{width:100%;height:100%}
    .radar-wrap .axis{stroke:var(--border);stroke-width:1;fill:none}
    .radar-wrap .grid{stroke:var(--border);stroke-width:0.5;stroke-dasharray:2 2;fill:none}
    .radar-wrap .area{fill:var(--o);fill-opacity:0.25;stroke:var(--o);stroke-width:2}
    .radar-wrap .area.second{fill:var(--b);fill-opacity:0.2;stroke:var(--b)}
    .radar-wrap .area.third{fill:var(--g);fill-opacity:0.2;stroke:var(--g)}

    /* Add buttons */
    .add-row{display:flex;gap:0.5rem;margin-top:0.5rem;flex-wrap:wrap}
    .btn{padding:0.4rem 0.8rem;font-size:0.75rem;font-weight:500;border:1px solid var(--border);background:var(--surface-2);color:var(--text);border-radius:6px;cursor:pointer;transition:all 0.2s}
    .btn:hover{border-color:var(--o);color:var(--o)}
    .btn.sm{padding:0.25rem 0.5rem;font-size:0.65rem}
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Decision Matrix</h1>
      <p>Варианты × критерии × веса. Взвешенная оценка для сложного выбора.</p>
    </header>

    <div class="grid">
      <!-- Matrix -->
      <div class="card">
        <div class="label">Матрица оценок (1–10)</div>
        <div class="matrix-wrap">
          <table class="matrix" id="matrix">
            <thead>
              <tr id="headerRow"></tr>
              <tr id="weightRow"></tr>
            </thead>
            <tbody id="matrixBody"></tbody>
          </table>
        </div>
        <div class="add-row">
          <button type="button" class="btn sm" id="addOpt">+ Вариант</button>
          <button type="button" class="btn sm" id="addCrit">+ Критерий</button>
          <button type="button" class="btn sm" id="reset">Сброс</button>
        </div>
      </div>

      <!-- Results -->
      <div class="card">
        <div class="label">Результат</div>
        <div class="results">
          <div>
            <div class="label" style="margin-bottom:0.5rem">Рейтинг</div>
            <div class="rank-list" id="rankList"></div>
          </div>
          <div>
            <div class="label" style="margin-bottom:0.5rem">Сравнение</div>
            <div class="bar-compare" id="barCompare"></div>
          </div>
          <div>
            <div class="label" style="margin-bottom:0.5rem">Радар (топ-3)</div>
            <div class="radar-wrap">
              <svg id="radarSvg" viewBox="0 0 200 200"></svg>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
(function() {
  const KEY = 'decision-matrix-data';
  const MAX_OPT = 10, MAX_CRIT = 10;

  let options = JSON.parse(localStorage.getItem(KEY + '-opt') || '["Вариант A","Вариант B","Вариант C"]');
  let criteria = JSON.parse(localStorage.getItem(KEY + '-crit') || '["Критерий 1","Критерий 2","Критерий 3","Критерий 4"]');
  let weights = JSON.parse(localStorage.getItem(KEY + '-w') || '[5,5,5,5]');
  let scores = JSON.parse(localStorage.getItem(KEY + '-scores') || '[[5,5,5,5],[5,6,4,5],[4,5,6,5]]');

  function save() {
    localStorage.setItem(KEY + '-opt', JSON.stringify(options));
    localStorage.setItem(KEY + '-crit', JSON.stringify(criteria));
    localStorage.setItem(KEY + '-w', JSON.stringify(weights));
    localStorage.setItem(KEY + '-scores', JSON.stringify(scores));
  }

  function ensureArrays() {
    while (weights.length < criteria.length) weights.push(5);
    while (scores.length < options.length) scores.push(criteria.map(() => 5));
    scores.forEach(row => { while (row.length < criteria.length) row.push(5); });
    weights.length = criteria.length;
    scores.length = options.length;
    scores.forEach((r, i) => { r.length = criteria.length; });
  }

  function render() {
    ensureArrays();
    const m = document.getElementById('matrix');
    const headerRow = document.getElementById('headerRow');
    const weightRow = document.getElementById('weightRow');
    const body = document.getElementById('matrixBody');

    headerRow.innerHTML = '<th class="opt">—</th>' + criteria.map((c, j) =>
      `<th class="crit"><input type="text" value="${c}" data-type="crit" data-i="${j}" placeholder="Критерий"></th>`
    ).join('') + '<th>Σ</th>';

    weightRow.innerHTML = '<th>Вес</th>' + criteria.map((c, j) =>
      `<th class="weight"><input type="number" min="1" max="10" value="${weights[j]}" data-w="${j}"></th>`
    ).join('') + '<th></th>';

    body.innerHTML = options.map((opt, i) => {
      const cells = criteria.map((_, j) =>
        `<td><input type="number" min="1" max="10" value="${scores[i][j]}" data-i="${i}" data-j="${j}"></td>`
      ).join('');
      return `<tr><th class="opt"><input type="text" value="${opt}" data-type="opt" data-i="${i}" placeholder="Вариант"></th>${cells}<td class="total" data-i="${i}">—</td></tr>`;
    }).join('');

    document.querySelectorAll('#headerRow input').forEach(inp => {
      inp.addEventListener('change', e => {
        const i = +e.target.dataset.i;
        if (e.target.dataset.type === 'crit') criteria[i] = e.target.value.trim() || 'Критерий';
        save();
        render();
      });
    });
    document.querySelectorAll('#weightRow input').forEach(inp => {
      inp.addEventListener('input', e => {
        weights[+e.target.dataset.w] = Math.min(10, Math.max(1, +e.target.value || 5));
        save();
        recalc();
      });
    });
    body.querySelectorAll('tr').forEach((tr, i) => {
      const optInp = tr.querySelector('th input');
      if (optInp) optInp.addEventListener('change', e => { options[i] = e.target.value.trim() || 'Вариант'; save(); recalc(); });
      tr.querySelectorAll('td input').forEach(inp => {
        const j = +inp.dataset.j;
        inp.addEventListener('input', e => { scores[i][j] = Math.min(10, Math.max(1, +e.target.value || 5)); save(); recalc(); });
      });
    });

    recalc();
  }

  function recalc() {
    ensureArrays();
    const totals = options.map((_, i) => {
      let s = 0, wSum = 0;
      criteria.forEach((_, j) => {
        s += scores[i][j] * weights[j];
        wSum += weights[j];
      });
      return wSum > 0 ? s / wSum : 0;
    });

    document.querySelectorAll('.total').forEach((td, i) => {
      td.textContent = totals[i].toFixed(1);
    });

    const order = totals.map((v, i) => [v, i]).sort((a, b) => b[0] - a[0]);
    const rankList = document.getElementById('rankList');
    rankList.innerHTML = order.map(([v, i], pos) =>
      `<div class="rank-item"><span class="pos">${pos + 1}</span><span class="name">${options[i] || '—'}</span><span class="score">${v.toFixed(1)}</span></div>`
    ).join('');

    const maxT = Math.max(...totals, 1);
    const barCompare = document.getElementById('barCompare');
    const colors = [vars.g, vars.b, vars.p, vars.o, vars.r];
    barCompare.innerHTML = order.map(([v, i], pos) =>
      `<div class="bar-row"><span class="name">${options[i] || '—'}</span><div class="track"><div class="fill" style="width:${(v/maxT)*100}%;background:${colors[pos % 5]}"></div></div><span class="val">${v.toFixed(1)}</span></div>`
    ).join('');

    drawRadar(order.slice(0, 3).map(([, i]) => i));
  }

  const vars = { o: 'var(--o)', g: 'var(--g)', b: 'var(--b)', p: 'var(--p)', r: 'var(--r)' };

  function drawRadar(indices) {
    const n = criteria.length;
    if (n < 3) return;
    const cx = 100, cy = 100, R = 85;
    const svg = document.getElementById('radarSvg');
    let html = '';

    for (let r = 1; r <= 5; r++) {
      const points = [];
      for (let i = 0; i <= n; i++) {
        const a = (i / n) * Math.PI * 2 - Math.PI / 2;
        points.push(`${cx + (R * r / 5) * Math.cos(a)},${cy + (R * r / 5) * Math.sin(a)}`);
      }
      html += `<polygon class="grid" points="${points.join(' ')}"/>`;
    }
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2 - Math.PI / 2;
      html += `<line class="axis" x1="${cx}" y1="${cy}" x2="${cx + R * Math.cos(a)}" y2="${cy + R * Math.sin(a)}"/>`;
    }

    const radarColors = ['var(--o)', 'var(--b)', 'var(--g)'];
    indices.forEach((optIdx, layer) => {
      const pts = [];
      for (let j = 0; j <= n; j++) {
        const k = j % n;
        const v = (scores[optIdx][k] - 1) / 9;
        const a = (k / n) * Math.PI * 2 - Math.PI / 2;
        pts.push(`${cx + R * v * Math.cos(a)},${cy + R * v * Math.sin(a)}`);
      }
      html += `<polygon class="area ${layer===1?'second':layer===2?'third':''}" points="${pts.join(' ')}" style="fill:${radarColors[layer]};fill-opacity:0.3;stroke:${radarColors[layer]}"/>`;
    });

    svg.innerHTML = html;
  }

  document.getElementById('addOpt').addEventListener('click', () => {
    if (options.length >= MAX_OPT) return;
    options.push(`Вариант ${String.fromCharCode(65 + options.length)}`);
    scores.push(criteria.map(() => 5));
    save();
    render();
  });
  document.getElementById('addCrit').addEventListener('click', () => {
    if (criteria.length >= MAX_CRIT) return;
    criteria.push(`Критерий ${criteria.length + 1}`);
    weights.push(5);
    scores.forEach(r => r.push(5));
    save();
    render();
  });
  document.getElementById('reset').addEventListener('click', () => {
    options = ['Вариант A', 'Вариант B', 'Вариант C'];
    criteria = ['Критерий 1', 'Критерий 2', 'Критерий 3', 'Критерий 4'];
    weights = [5, 5, 5, 5];
    scores = [[5, 5, 5, 5], [5, 6, 4, 5], [4, 5, 6, 5]];
    save();
    render();
  });

  render();
})();
  </script>
</body>
</html>
