<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Orrery — планетарная система целей</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #04050d;
      --bg2:     #080b18;
      --surface: #0e1222;
      --border:  rgba(100,130,255,0.14);
      --text:    #dce6ff;
      --muted:   #5a6888;
      --font:    'Geist', system-ui, sans-serif;
      --syne:    'Syne', sans-serif;
      --mono:    'Geist Mono', monospace;
    }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); display: flex; flex-direction: column; }

    /* Topbar */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.7rem 1.1rem; flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
    }
    .brand { display: flex; align-items: baseline; gap: 0.6rem; }
    .brand h1 {
      font-family: var(--syne); font-size: 1.1rem; font-weight: 800;
      background: linear-gradient(120deg, #c0d0ff, #8090f0, #6070e0);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .brand span { font-size: 0.72rem; color: var(--muted); }
    .topbar-right { display: flex; gap: 0.5rem; align-items: center; }
    .lang { display: flex; border-radius: 7px; overflow: hidden; border: 1px solid var(--border); }
    .lang button { padding: 0.32rem 0.65rem; border: none; background: transparent; color: var(--muted); cursor: pointer; font-size: 0.7rem; font-weight: 700; }
    .lang button.on { background: rgba(100,130,255,0.18); color: #a0b0ff; }

    .btn {
      font-family: var(--font); font-size: 0.78rem; font-weight: 600;
      padding: 0.42rem 0.85rem; border-radius: 8px;
      border: 1px solid var(--border); background: var(--surface); color: var(--text);
      cursor: pointer; transition: background 0.15s, transform 0.1s;
    }
    .btn:hover { background: #141830; }
    .btn:active { transform: scale(0.97); }
    .btn.primary { background: linear-gradient(135deg, #1a2060, #2a38b0); border-color: transparent; color: #c0d0ff; }
    .btn.primary:hover { filter: brightness(1.15); }
    .btn.danger { color: #f87171; border-color: rgba(248,113,113,0.2); background: transparent; }

    /* Main layout */
    .app { flex: 1; min-height: 0; position: relative; }
    canvas { display: block; width: 100%; height: 100%; }

    /* Stats bar */
    .stats-bar {
      position: absolute; top: 0.75rem; left: 0.75rem;
      display: flex; gap: 0.5rem; flex-wrap: wrap;
      pointer-events: none;
    }
    .stat-chip {
      background: rgba(8,11,24,0.8); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.35rem 0.65rem;
      font-size: 0.72rem; backdrop-filter: blur(8px);
    }
    .stat-chip strong { color: #a0b8ff; font-family: var(--mono); }

    /* Hint */
    .canvas-hint {
      position: absolute; bottom: 0.75rem; right: 0.85rem;
      font-size: 0.65rem; color: rgba(255,255,255,0.18);
      pointer-events: none;
    }

    /* Tooltip */
    .tooltip {
      position: absolute; pointer-events: none;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 0.7rem 0.9rem; min-width: 180px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      opacity: 0; transition: opacity 0.15s; z-index: 20;
    }
    .tooltip.visible { opacity: 1; }
    .tt-name { font-weight: 700; font-size: 0.9rem; margin-bottom: 0.25rem; }
    .tt-prog { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.3rem; font-family: var(--mono); }
    .tt-bar { height: 5px; border-radius: 3px; background: rgba(255,255,255,0.08); overflow: hidden; }
    .tt-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }

    /* Modal */
    .overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center; padding: 1rem;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 18px; padding: 1.6rem; max-width: 380px; width: 100%;
      box-shadow: 0 24px 64px rgba(0,0,0,0.7);
      transform: translateY(12px); transition: transform 0.2s;
    }
    .overlay.open .modal { transform: translateY(0); }
    .modal-title { font-family: var(--syne); font-size: 1.2rem; font-weight: 700; margin-bottom: 1.25rem; }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); font-weight: 700; margin-bottom: 0.4rem; }
    .field input[type="text"] {
      width: 100%; padding: 0.55rem 0.7rem; border-radius: 9px;
      border: 1px solid var(--border); background: var(--bg2); color: var(--text);
      font-family: var(--font); font-size: 0.88rem; outline: none;
    }
    .field input[type="text"]:focus { border-color: rgba(100,130,255,0.45); }
    .field input[type="range"] { width: 100%; accent-color: #7080f0; }
    .field .range-row { display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--muted); font-family: var(--mono); margin-top: 0.2rem; }
    .color-row { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .color-swatch {
      width: 28px; height: 28px; border-radius: 7px; cursor: pointer;
      border: 2px solid transparent; transition: transform 0.12s;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.on { border-color: white; }
    .modal-actions { display: flex; gap: 0.5rem; margin-top: 1.25rem; }
    .modal-actions .btn { flex: 1; }

    @media (max-width: 520px) {
      html, body { overflow: auto; }
      .app { min-height: 70vw; }
    }
  </style>
</head>
<body>
<div class="topbar">
  <div class="brand">
    <h1 id="headTitle">Orrery</h1>
    <span id="headSub">планетарная система целей</span>
  </div>
  <div class="topbar-right">
    <div class="lang">
      <button type="button" id="bRu" class="on">RU</button>
      <button type="button" id="bEn">EN</button>
    </div>
    <button type="button" class="btn primary" id="btnAdd"></button>
  </div>
</div>

<div class="app">
  <canvas id="c"></canvas>
  <div class="stats-bar" id="statsBar"></div>
  <div class="canvas-hint" id="canvasHint"></div>
  <div class="tooltip" id="tooltip">
    <div class="tt-name" id="ttName"></div>
    <div class="tt-prog" id="ttProg"></div>
    <div class="tt-bar"><div class="tt-fill" id="ttFill"></div></div>
  </div>
</div>

<!-- Add/Edit modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle"></div>
    <div class="field">
      <label id="lName"></label>
      <input type="text" id="fName" maxlength="40">
    </div>
    <div class="field">
      <label id="lProgress"></label>
      <input type="range" id="fProgress" min="0" max="100" value="0">
      <div class="range-row"><span>0%</span><span id="progressVal">0%</span><span>100%</span></div>
    </div>
    <div class="field">
      <label id="lPriority"></label>
      <input type="range" id="fPriority" min="1" max="5" value="3" step="1">
      <div class="range-row"><span id="prio1"></span><span></span><span id="prio5"></span></div>
    </div>
    <div class="field">
      <label id="lColor"></label>
      <div class="color-row" id="colorRow"></div>
    </div>
    <div class="modal-actions">
      <button type="button" class="btn danger" id="btnDel" style="display:none"></button>
      <button type="button" class="btn" id="btnCancel"></button>
      <button type="button" class="btn primary" id="btnSave"></button>
    </div>
  </div>
</div>

<script>
(function () {
  const SK = 'orrery-v1';
  const LK = 'orrery-lang';

  const COLORS = ['#e05050','#e08830','#d4c030','#50c060','#30b0a0','#5080e0','#9060d0','#d050a0','#60c0d0','#f0a060'];

  const i18n = {
    ru: {
      title: 'Orrery', sub: 'планетарная система целей',
      addBtn: '+ Новая цель',
      hint: 'Нажми на планету для деталей',
      statsTotal: 'Целей', statsDone: 'Завершено', statsAvg: 'Средний прогресс',
      modalAdd: 'Новая цель', modalEdit: 'Редактировать цель',
      lName: 'Название цели', lProgress: 'Прогресс', lPriority: 'Приоритет (орбита)',
      lColor: 'Цвет планеты',
      prio1: 'ближе', prio5: 'дальше',
      del: 'Удалить', cancel: 'Отмена', save: 'Сохранить',
      you: 'Ты',
      confirmDel: 'Удалить эту цель?',
      emptyHint: 'Нажми «+ Новая цель», чтобы начать',
      prog: (p) => `Прогресс: ${p}%`,
      done: 'Завершено ✓',
    },
    en: {
      title: 'Orrery', sub: 'your planetary goal system',
      addBtn: '+ New goal',
      hint: 'Click a planet for details',
      statsTotal: 'Goals', statsDone: 'Completed', statsAvg: 'Avg progress',
      modalAdd: 'New goal', modalEdit: 'Edit goal',
      lName: 'Goal name', lProgress: 'Progress', lPriority: 'Priority (orbit)',
      lColor: 'Planet color',
      prio1: 'closer', prio5: 'farther',
      del: 'Delete', cancel: 'Cancel', save: 'Save',
      you: 'You',
      confirmDel: 'Delete this goal?',
      emptyHint: 'Click «+ New goal» to begin',
      prog: (p) => `Progress: ${p}%`,
      done: 'Done ✓',
    }
  };

  let lang = localStorage.getItem(LK) || 'ru';
  let goals = [];
  let editId = null;
  let selectedColor = COLORS[5];
  let raf = null;
  let hoverId = null;
  let stars = [];

  function t() { return i18n[lang]; }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

  function load() {
    try { goals = JSON.parse(localStorage.getItem(SK) || '[]'); } catch (e) { goals = []; }
  }
  function persist() { localStorage.setItem(SK, JSON.stringify(goals)); }

  /* Orbit radius: priority 1=close, 5=far */
  function orbitR(priority, maxR) {
    const minO = maxR * 0.18;
    const maxO = maxR * 0.78;
    return minO + ((priority - 1) / 4) * (maxO - minO);
  }

  /* Planet size based on progress */
  function planetR(progress) {
    return 10 + (progress / 100) * 10;
  }

  /* Generate stars once */
  function makeStars(W, H) {
    stars = [];
    for (let i = 0; i < 200; i++) {
      stars.push({
        x: Math.random() * W, y: Math.random() * H,
        r: Math.random() * 1.4,
        a: 0.15 + Math.random() * 0.6
      });
    }
  }

  /* ── Canvas draw loop ── */
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  function resize() {
    const app = canvas.parentElement;
    canvas.width = app.clientWidth;
    canvas.height = app.clientHeight;
    makeStars(canvas.width, canvas.height);
  }

  function draw(ts) {
    const W = canvas.width, H = canvas.height;
    const cx = W / 2, cy = H / 2;
    const maxR = Math.min(W, H) / 2 - 20;
    ctx.clearRect(0, 0, W, H);

    /* Stars */
    stars.forEach(s => {
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${s.a})`;
      ctx.fill();
    });

    /* Nebula glow */
    const ng = ctx.createRadialGradient(cx, cy, 0, cx, cy, maxR * 0.6);
    ng.addColorStop(0, 'rgba(40,60,180,0.08)');
    ng.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = ng;
    ctx.fillRect(0, 0, W, H);

    const dt = 0.00025; // angular step per ms frame (tuned for ~60fps)
    goals.forEach(g => {
      g.angle = (g.angle || 0) + dt * (6 - g.priority);
    });

    /* Orbit rings */
    const drawnOrbits = new Set();
    goals.forEach(g => {
      const r = orbitR(g.priority, maxR);
      const key = Math.round(r);
      if (drawnOrbits.has(key)) return;
      drawnOrbits.add(key);
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(100,130,255,0.08)';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 8]);
      ctx.stroke();
      ctx.setLineDash([]);
    });

    /* Central star (YOU) */
    const starGlow = ctx.createRadialGradient(cx, cy, 0, cx, cy, 28);
    starGlow.addColorStop(0, 'rgba(220,230,255,1)');
    starGlow.addColorStop(0.35, 'rgba(150,170,255,0.9)');
    starGlow.addColorStop(1, 'rgba(80,100,220,0)');
    ctx.beginPath();
    ctx.arc(cx, cy, 26, 0, Math.PI * 2);
    ctx.fillStyle = starGlow;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx, cy, 10, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();
    ctx.fillStyle = 'rgba(200,215,255,0.9)';
    ctx.font = `600 11px Geist, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(t().you, cx, cy + 34);

    /* Empty hint */
    if (goals.length === 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.font = '14px Geist, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(t().emptyHint, cx, cy + 70);
    }

    /* Planets */
    goals.forEach(g => {
      const or = orbitR(g.priority, maxR);
      const px = cx + Math.cos(g.angle) * or;
      const py = cy + Math.sin(g.angle) * or;
      const pr = planetR(g.progress);
      const isHover = hoverId === g.id;

      /* Planet glow */
      const glow = ctx.createRadialGradient(px, py, 0, px, py, pr * 2.5);
      glow.addColorStop(0, g.color + '55');
      glow.addColorStop(1, 'transparent');
      ctx.beginPath();
      ctx.arc(px, py, pr * 2.5, 0, Math.PI * 2);
      ctx.fillStyle = glow;
      ctx.fill();

      /* Planet body */
      const pg = ctx.createRadialGradient(px - pr * 0.3, py - pr * 0.3, 0, px, py, pr);
      pg.addColorStop(0, lighten(g.color, 0.4));
      pg.addColorStop(1, g.color);
      ctx.beginPath();
      ctx.arc(px, py, pr * (isHover ? 1.15 : 1), 0, Math.PI * 2);
      ctx.fillStyle = pg;
      ctx.fill();

      /* Progress arc */
      if (g.progress > 0) {
        const startA = -Math.PI / 2;
        const endA = startA + (g.progress / 100) * Math.PI * 2;
        ctx.beginPath();
        ctx.arc(px, py, pr + 4, startA, endA);
        ctx.strokeStyle = g.color;
        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
        ctx.stroke();
        ctx.lineCap = 'butt';
      }

      /* Completed ring */
      if (g.progress >= 100) {
        ctx.beginPath();
        ctx.arc(px, py, pr + 7, 0, Math.PI * 2);
        ctx.strokeStyle = g.color + 'aa';
        ctx.lineWidth = 1;
        ctx.setLineDash([3, 5]);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      /* Label */
      const labelY = py + pr + 16;
      ctx.fillStyle = isHover ? 'rgba(255,255,255,0.9)' : 'rgba(255,255,255,0.55)';
      ctx.font = `${isHover ? '600' : '500'} 11px Geist, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      const maxLabelW = 90;
      let label = g.name;
      while (ctx.measureText(label).width > maxLabelW && label.length > 5) label = label.slice(0, -1);
      if (label !== g.name) label += '…';
      ctx.fillText(label, px, labelY);
      ctx.textBaseline = 'alphabetic';

      g._canvasX = px; g._canvasY = py; g._canvasR = pr;
    });

    persist();
    raf = requestAnimationFrame(draw);
  }

  function lighten(hex, amount) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return `rgb(${Math.min(255,r+Math.round((255-r)*amount))},${Math.min(255,g+Math.round((255-g)*amount))},${Math.min(255,b+Math.round((255-b)*amount))})`;
  }

  /* ── Stats ── */
  function buildStats() {
    const tr = t();
    const done = goals.filter(g => g.progress >= 100).length;
    const avg = goals.length ? Math.round(goals.reduce((s, g) => s + g.progress, 0) / goals.length) : 0;
    document.getElementById('statsBar').innerHTML = `
      <div class="stat-chip">${tr.statsTotal} <strong>${goals.length}</strong></div>
      <div class="stat-chip">${tr.statsDone} <strong>${done}</strong></div>
      ${goals.length ? `<div class="stat-chip">${tr.statsAvg} <strong>${avg}%</strong></div>` : ''}
    `;
  }

  /* ── Hover / click ── */
  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
    const my = (e.clientY - rect.top) * (canvas.height / rect.height);
    let found = null;
    goals.forEach(g => {
      if (!g._canvasX) return;
      const dx = mx - g._canvasX, dy = my - g._canvasY;
      if (Math.sqrt(dx*dx + dy*dy) < g._canvasR + 12) found = g;
    });
    hoverId = found ? found.id : null;
    canvas.style.cursor = found ? 'pointer' : 'default';
    const tt = document.getElementById('tooltip');
    if (found) {
      document.getElementById('ttName').textContent = found.name;
      document.getElementById('ttProg').textContent = found.progress >= 100 ? t().done : t().prog(found.progress);
      document.getElementById('ttFill').style.width = found.progress + '%';
      document.getElementById('ttFill').style.background = found.color;
      const tx = Math.min(e.clientX + 14, window.innerWidth - 210);
      const ty = Math.max(e.clientY - 70, 8);
      tt.style.left = tx + 'px'; tt.style.top = ty + 'px';
      tt.classList.add('visible');
    } else {
      tt.classList.remove('visible');
    }
  });

  canvas.addEventListener('mouseleave', () => { document.getElementById('tooltip').classList.remove('visible'); hoverId = null; });

  canvas.addEventListener('click', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
    const my = (e.clientY - rect.top) * (canvas.height / rect.height);
    goals.forEach(g => {
      if (!g._canvasX) return;
      const dx = mx - g._canvasX, dy = my - g._canvasY;
      if (Math.sqrt(dx*dx + dy*dy) < g._canvasR + 12) openModal(g.id);
    });
  });

  canvas.addEventListener('touchstart', e => {
    const touch = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    const mx = (touch.clientX - rect.left) * (canvas.width / rect.width);
    const my = (touch.clientY - rect.top) * (canvas.height / rect.height);
    goals.forEach(g => {
      if (!g._canvasX) return;
      const dx = mx - g._canvasX, dy = my - g._canvasY;
      if (Math.sqrt(dx*dx + dy*dy) < g._canvasR + 16) { e.preventDefault(); openModal(g.id); }
    });
  }, { passive: false });

  /* ── Modal ── */
  function buildColorRow() {
    const el = document.getElementById('colorRow');
    el.innerHTML = '';
    COLORS.forEach(c => {
      const d = document.createElement('div');
      d.className = 'color-swatch' + (selectedColor === c ? ' on' : '');
      d.style.background = c;
      d.addEventListener('click', () => { selectedColor = c; buildColorRow(); });
      el.appendChild(d);
    });
  }

  document.getElementById('fProgress').addEventListener('input', e => {
    document.getElementById('progressVal').textContent = e.target.value + '%';
  });

  document.getElementById('btnAdd').addEventListener('click', () => openModal(null));

  function openModal(id) {
    editId = id;
    const tr = t();
    const g = id ? goals.find(x => x.id === id) : null;
    document.getElementById('modalTitle').textContent = g ? tr.modalEdit : tr.modalAdd;
    document.getElementById('lName').textContent = tr.lName;
    document.getElementById('lProgress').textContent = tr.lProgress;
    document.getElementById('lPriority').textContent = tr.lPriority;
    document.getElementById('lColor').textContent = tr.lColor;
    document.getElementById('prio1').textContent = tr.prio1;
    document.getElementById('prio5').textContent = tr.prio5;
    document.getElementById('btnCancel').textContent = tr.cancel;
    document.getElementById('btnSave').textContent = tr.save;
    const delBtn = document.getElementById('btnDel');
    delBtn.style.display = g ? '' : 'none';
    delBtn.textContent = tr.del;
    document.getElementById('fName').value = g ? g.name : '';
    document.getElementById('fProgress').value = g ? g.progress : 0;
    document.getElementById('progressVal').textContent = (g ? g.progress : 0) + '%';
    document.getElementById('fPriority').value = g ? g.priority : 3;
    selectedColor = g ? g.color : COLORS[Math.floor(Math.random() * COLORS.length)];
    buildColorRow();
    document.getElementById('overlay').classList.add('open');
    setTimeout(() => document.getElementById('fName').focus(), 80);
  }

  document.getElementById('btnSave').addEventListener('click', () => {
    const name = document.getElementById('fName').value.trim();
    if (!name) return;
    const progress = parseInt(document.getElementById('fProgress').value);
    const priority = parseInt(document.getElementById('fPriority').value);
    if (editId) {
      const g = goals.find(x => x.id === editId);
      if (g) { g.name = name; g.progress = progress; g.priority = priority; g.color = selectedColor; }
    } else {
      goals.push({ id: uid(), name, progress, priority, color: selectedColor, angle: Math.random() * Math.PI * 2 });
    }
    persist(); closeModal(); buildStats();
  });

  document.getElementById('btnDel').addEventListener('click', () => {
    if (!editId) return;
    if (!confirm(t().confirmDel)) return;
    goals = goals.filter(g => g.id !== editId);
    persist(); closeModal(); buildStats();
  });

  document.getElementById('btnCancel').addEventListener('click', closeModal);
  document.getElementById('overlay').addEventListener('click', e => { if (e.target === document.getElementById('overlay')) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  function closeModal() { document.getElementById('overlay').classList.remove('open'); editId = null; }

  /* ── Lang ── */
  document.getElementById('bRu').addEventListener('click', () => { lang = 'ru'; localStorage.setItem(LK, lang); render(); });
  document.getElementById('bEn').addEventListener('click', () => { lang = 'en'; localStorage.setItem(LK, lang); render(); });

  /* ── Resize ── */
  window.addEventListener('resize', () => { resize(); });

  /* ── Main render ── */
  function render() {
    const tr = t();
    document.getElementById('bRu').classList.toggle('on', lang === 'ru');
    document.getElementById('bEn').classList.toggle('on', lang === 'en');
    document.getElementById('headTitle').textContent = tr.title;
    document.getElementById('headSub').textContent = tr.sub;
    document.getElementById('btnAdd').textContent = tr.addBtn;
    document.getElementById('canvasHint').textContent = tr.hint;
    buildStats();
  }

  load();
  resize();
  render();
  raf = requestAnimationFrame(draw);
})();
</script>
</body>
</html>
