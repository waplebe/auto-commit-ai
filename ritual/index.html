<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ritual — твой ежедневный ритуал</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0e0b07;
      --bg2:     #17120a;
      --surface: #1e1710;
      --border:  rgba(255,210,130,0.12);
      --text:    #f0e8d8;
      --muted:   #8a7a60;
      --amber:   #f5b731;
      --amber2:  #ff9d3d;
      --gold:    #ffd97d;
      --font:    'Geist', system-ui, sans-serif;
      --serif:   'Cormorant Garamond', Georgia, serif;
      --mono:    'Geist Mono', monospace;
    }
    html, body { height: 100%; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Ambient glow */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(245,183,49,0.08), transparent),
        radial-gradient(ellipse 40% 30% at 80% 80%, rgba(255,157,61,0.06), transparent);
    }

    .wrap { position: relative; z-index: 1; max-width: 620px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

    /* Header */
    .top-bar { display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; justify-content: space-between; margin-bottom: 2.5rem; }
    .brand h1 {
      font-family: var(--serif); font-size: 2.2rem; font-weight: 500; font-style: italic;
      background: linear-gradient(135deg, #ffd97d, #f5b731, #ff9d3d);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      line-height: 1;
    }
    .brand p { font-size: 0.8rem; color: var(--muted); margin-top: 0.2rem; }
    .top-actions { display: flex; gap: 0.5rem; align-items: center; }
    .lang { display: flex; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
    .lang button { padding: 0.38rem 0.75rem; border: none; background: transparent; color: var(--muted); cursor: pointer; font-size: 0.72rem; font-weight: 700; }
    .lang button.on { background: rgba(245,183,49,0.15); color: var(--amber); }

    .btn {
      font-family: var(--font); font-size: 0.82rem; font-weight: 600;
      padding: 0.5rem 1rem; border-radius: 10px;
      border: 1px solid var(--border); background: var(--surface); color: var(--text);
      cursor: pointer; transition: background 0.18s, transform 0.12s;
    }
    .btn:hover { background: #26200f; }
    .btn:active { transform: scale(0.97); }
    .btn.primary {
      background: linear-gradient(135deg, #b87d10, #d4950a);
      border-color: transparent; color: #fff8e0;
    }
    .btn.primary:hover { filter: brightness(1.1); }
    .btn.ghost { background: transparent; }
    .btn.danger { color: #f87171; border-color: rgba(248,113,113,0.2); background: transparent; }

    /* Stats chips */
    .chips { display: flex; flex-wrap: wrap; gap: 0.6rem; margin-bottom: 2rem; }
    .chip { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.5rem 0.9rem; font-size: 0.78rem; }
    .chip strong { color: var(--amber); font-size: 1.05rem; margin-right: 0.2rem; }

    /* Builder mode */
    #builderMode, #runMode, #doneMode { transition: opacity 0.3s; }

    .section-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.15em; color: var(--muted); font-weight: 600; margin-bottom: 0.75rem; }
    .total-time { font-size: 0.8rem; color: var(--muted); margin-bottom: 1.25rem; }
    .total-time strong { color: var(--gold); }

    .step-list { display: flex; flex-direction: column; gap: 0.55rem; margin-bottom: 1.25rem; }
    .step-row {
      display: grid; grid-template-columns: 1fr auto auto auto auto;
      gap: 0.4rem; align-items: center;
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 0.65rem 0.75rem;
      transition: background 0.15s;
    }
    .step-row:hover { background: #1e1a10; }
    .step-row input.name {
      background: transparent; border: none; color: var(--text); font-family: var(--font);
      font-size: 0.9rem; outline: none; width: 100%; min-width: 0;
    }
    .step-row input.name::placeholder { color: var(--muted); }
    .step-min {
      display: flex; align-items: center; gap: 0.35rem;
      background: rgba(0,0,0,0.25); border-radius: 8px; padding: 0.3rem 0.5rem;
    }
    .step-min input {
      width: 36px; background: transparent; border: none; color: var(--amber);
      font-family: var(--mono); font-size: 0.88rem; text-align: center; outline: none;
    }
    .step-min span { font-size: 0.65rem; color: var(--muted); }
    .icon-btn { border: none; background: transparent; color: var(--muted); cursor: pointer; font-size: 1rem; padding: 0.2rem 0.3rem; transition: color 0.15s; }
    .icon-btn:hover { color: var(--text); }
    .icon-btn.del:hover { color: #f87171; }

    .add-row { display: flex; gap: 0.5rem; }
    .add-row input {
      flex: 1; padding: 0.6rem 0.75rem; border-radius: 10px;
      border: 1px solid var(--border); background: var(--surface); color: var(--text);
      font-family: var(--font); font-size: 0.88rem; outline: none;
    }
    .add-row input:focus { border-color: rgba(245,183,49,0.4); }
    .builder-footer { display: flex; justify-content: flex-end; margin-top: 1.5rem; gap: 0.5rem; }

    /* Run mode */
    #runMode { text-align: center; }
    .run-step-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.18em; color: var(--muted); margin-bottom: 0.5rem; }
    .run-step-name { font-family: var(--serif); font-size: clamp(2rem, 8vw, 3.2rem); font-style: italic; font-weight: 500; margin-bottom: 1.25rem; line-height: 1.1; }
    .run-timer { font-family: var(--mono); font-size: clamp(3.5rem, 14vw, 6rem); font-weight: 500; color: var(--amber); line-height: 1; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
    .run-timer.ending { color: var(--amber2); animation: pulse 0.8s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

    .run-progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.07); border-radius: 3px; overflow: hidden; margin-bottom: 1.5rem; }
    .run-progress-fill { height: 100%; background: linear-gradient(90deg, var(--amber), var(--amber2)); border-radius: 3px; transition: width 0.25s linear; }

    .run-steps-mini { display: flex; justify-content: center; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 2rem; }
    .mini-step { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 0.65rem; color: var(--muted); transition: all 0.2s; }
    .mini-step.done { background: rgba(245,183,49,0.2); border-color: var(--amber); color: var(--amber); }
    .mini-step.active { background: linear-gradient(135deg, #b87d10, #d4950a); border-color: transparent; color: #fff; }

    .run-controls { display: flex; justify-content: center; gap: 0.75rem; flex-wrap: wrap; }

    /* Done mode */
    #doneMode { text-align: center; padding-top: 1rem; }
    .done-icon { font-size: 3.5rem; display: block; margin-bottom: 1rem; }
    .done-title { font-family: var(--serif); font-size: 2.5rem; font-style: italic; font-weight: 500; margin-bottom: 0.5rem; }
    .done-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
    .done-summary { display: flex; justify-content: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem; }
    .done-chip { text-align: center; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 0.75rem 1.25rem; }
    .done-chip .dv { font-family: var(--mono); font-size: 1.6rem; color: var(--amber); }
    .done-chip .dl { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-top: 0.2rem; }

    /* History dots */
    .history-row { display: flex; justify-content: center; gap: 0.4rem; flex-wrap: wrap; margin-top: 2.5rem; }
    .history-dot { width: 24px; height: 24px; border-radius: 6px; background: var(--surface); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.6rem; color: var(--muted); cursor: default; }
    .history-dot.done-day { background: rgba(245,183,49,0.2); border-color: var(--amber); color: var(--amber); }
    .history-dot.today { box-shadow: 0 0 0 2px var(--amber); }
  </style>
</head>
<body>
<div class="wrap">
  <div class="top-bar">
    <div class="brand">
      <h1 id="headTitle">Ritual</h1>
      <p id="headSub">Ежедневная практика, шаг за шагом</p>
    </div>
    <div class="top-actions">
      <div class="lang">
        <button type="button" id="bRu" class="on">RU</button>
        <button type="button" id="bEn">EN</button>
      </div>
    </div>
  </div>

  <div class="chips" id="chipsRow"></div>

  <!-- BUILDER -->
  <div id="builderMode">
    <div class="section-label" id="lSteps"></div>
    <div class="total-time" id="totalTime"></div>
    <div class="step-list" id="stepList"></div>
    <div class="add-row">
      <input type="text" id="newStepName" maxlength="60">
      <input type="number" id="newStepMin" min="1" max="120" value="5" style="width:64px;padding:.6rem;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--amber);font-family:var(--mono);font-size:.9rem;text-align:center;outline:none">
      <button type="button" class="btn primary" id="btnAddStep">+</button>
    </div>
    <div class="builder-footer">
      <button type="button" class="btn ghost" id="btnResetDefault" style="font-size:.75rem;color:var(--muted)"></button>
      <button type="button" class="btn primary" id="btnStart"></button>
    </div>
  </div>

  <!-- RUNNING -->
  <div id="runMode" style="display:none">
    <div class="run-step-label" id="runLabel"></div>
    <div class="run-step-name" id="runStepName">—</div>
    <div class="run-timer" id="runTimer">00:00</div>
    <div class="run-progress-bar"><div class="run-progress-fill" id="runFill" style="width:0%"></div></div>
    <div class="run-steps-mini" id="runMini"></div>
    <div class="run-controls">
      <button type="button" class="btn" id="btnPause"></button>
      <button type="button" class="btn" id="btnSkip"></button>
      <button type="button" class="btn danger" id="btnAbort"></button>
    </div>
  </div>

  <!-- DONE -->
  <div id="doneMode" style="display:none">
    <span class="done-icon">🌅</span>
    <div class="done-title" id="doneTitle"></div>
    <div class="done-sub" id="doneSub"></div>
    <div class="done-summary" id="doneSummary"></div>
    <div style="display:flex;justify-content:center;gap:.75rem;flex-wrap:wrap">
      <button type="button" class="btn primary" id="btnRunAgain"></button>
      <button type="button" class="btn" id="btnBackBuilder"></button>
    </div>
    <div style="margin-top:2rem">
      <div class="section-label" id="lHistory"></div>
      <div class="history-row" id="historyRow"></div>
    </div>
  </div>
</div>

<script>
(function () {
  const SK = 'ritual-v2';
  const LK = 'ritual-lang';

  const i18n = {
    ru: {
      title: 'Ritual', sub: 'Ежедневная практика, шаг за шагом',
      lSteps: 'Шаги ритуала', lHistory: 'История за 14 дней',
      totalTime: (m) => `Всего: <strong>${m} мин</strong>`,
      placeholder: 'Название шага…',
      resetDefault: 'Загрузить пример', start: '▶ Запустить ритуал',
      runLabel: (i, n) => `ШАГ ${i} / ${n}`,
      pause: '⏸ Пауза', resume: '▶ Продолжить',
      skip: 'Пропустить →', abort: '✕ Прервать',
      chipStreak: 'Серия', chipDone: 'Выполнено', chipDays: 'дней', chipTotal: 'Всего раз',
      doneTitle: 'Сделано!', doneSub: 'Ритуал завершён. Так держать.',
      doneSteps: 'Шагов', doneTime: 'Мин потрачено',
      runAgain: '↩ Снова', backBuilder: 'Редактировать',
      mins: 'мин',
      defaultSteps: [
        { name: 'Вода натощак', minutes: 2 },
        { name: 'Растяжка', minutes: 5 },
        { name: 'Дыхание / медитация', minutes: 10 },
        { name: 'Журнал', minutes: 10 },
        { name: 'Чтение', minutes: 15 },
      ]
    },
    en: {
      title: 'Ritual', sub: 'Daily practice, one step at a time',
      lSteps: 'Ritual steps', lHistory: '14-day history',
      totalTime: (m) => `Total: <strong>${m} min</strong>`,
      placeholder: 'Step name…',
      resetDefault: 'Load example', start: '▶ Start ritual',
      runLabel: (i, n) => `STEP ${i} / ${n}`,
      pause: '⏸ Pause', resume: '▶ Resume',
      skip: 'Skip →', abort: '✕ Quit',
      chipStreak: 'Streak', chipDone: 'Done', chipDays: 'days', chipTotal: 'Total runs',
      doneTitle: 'Done!', doneSub: 'Ritual complete. Keep it up.',
      doneSteps: 'Steps', doneTime: 'Min spent',
      runAgain: '↩ Again', backBuilder: 'Edit steps',
      mins: 'min',
      defaultSteps: [
        { name: 'Water first thing', minutes: 2 },
        { name: 'Stretching', minutes: 5 },
        { name: 'Breathing / meditation', minutes: 10 },
        { name: 'Journaling', minutes: 10 },
        { name: 'Reading', minutes: 15 },
      ]
    }
  };

  let lang = localStorage.getItem(LK) || 'ru';
  let state = load();
  let runState = null; // { stepIdx, remaining, total, paused, interval, stepsCompleted }
  let audioCtx = null;

  function t() { return i18n[lang]; }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
  function dateKey(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }

  function load() {
    try {
      const d = JSON.parse(localStorage.getItem(SK) || '{}');
      if (!d.steps) d.steps = defaultSteps();
      if (!d.history) d.history = {};
      return d;
    } catch (e) { return { steps: defaultSteps(), history: {} }; }
  }
  function persist() { localStorage.setItem(SK, JSON.stringify(state)); }
  function defaultSteps() {
    return t().defaultSteps.map(s => ({ id: uid(), name: s.name, minutes: s.minutes }));
  }

  /* Bell sound */
  function bell() {
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = 'sine'; o.frequency.setValueAtTime(880, audioCtx.currentTime);
      o.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 1.2);
      g.gain.setValueAtTime(0.3, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
      o.start(audioCtx.currentTime); o.stop(audioCtx.currentTime + 1.5);
    } catch (e) {}
  }

  /* Chips */
  function buildChips() {
    const tr = t();
    const today = dateKey(new Date());
    const hist = state.history;
    const keys = Object.keys(hist).sort();
    let streak = 0;
    for (let i = 0; i < 30; i++) {
      const d = new Date(); d.setDate(d.getDate() - i);
      if (hist[dateKey(d)]) streak++;
      else break;
    }
    document.getElementById('chipsRow').innerHTML = [
      `<div class="chip"><strong>${streak}</strong> ${tr.chipStreak} ${tr.chipDays}</div>`,
      `<div class="chip"><strong>${keys.length}</strong> ${tr.chipTotal}</div>`,
    ].join('');
  }

  /* Builder */
  function buildStepList() {
    const tr = t();
    const el = document.getElementById('stepList');
    el.innerHTML = '';
    state.steps.forEach((step, idx) => {
      const row = document.createElement('div');
      row.className = 'step-row';
      row.innerHTML = `
        <input class="name" type="text" value="${escHtml(step.name)}" placeholder="${tr.placeholder}" maxlength="60">
        <div class="step-min">
          <input type="number" value="${step.minutes}" min="1" max="120">
          <span>${tr.mins}</span>
        </div>
        <button type="button" class="icon-btn" data-up title="↑">↑</button>
        <button type="button" class="icon-btn" data-down title="↓">↓</button>
        <button type="button" class="icon-btn del" data-del title="×">×</button>
      `;
      row.querySelector('.name').addEventListener('input', e => {
        state.steps[idx].name = e.target.value; persist();
      });
      row.querySelector('input[type="number"]').addEventListener('change', e => {
        const v = Math.max(1, Math.min(120, parseInt(e.target.value) || 1));
        state.steps[idx].minutes = v; e.target.value = v;
        persist(); updateTotalTime();
      });
      row.querySelector('[data-up]').addEventListener('click', () => {
        if (idx > 0) { [state.steps[idx-1], state.steps[idx]] = [state.steps[idx], state.steps[idx-1]]; persist(); buildStepList(); }
      });
      row.querySelector('[data-down]').addEventListener('click', () => {
        if (idx < state.steps.length - 1) { [state.steps[idx], state.steps[idx+1]] = [state.steps[idx+1], state.steps[idx]]; persist(); buildStepList(); }
      });
      row.querySelector('[data-del]').addEventListener('click', () => {
        state.steps.splice(idx, 1); persist(); buildStepList(); updateTotalTime();
      });
      el.appendChild(row);
    });
    updateTotalTime();
  }

  function updateTotalTime() {
    const total = state.steps.reduce((s, x) => s + x.minutes, 0);
    document.getElementById('totalTime').innerHTML = t().totalTime(total);
  }

  function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  document.getElementById('btnAddStep').addEventListener('click', () => {
    const name = document.getElementById('newStepName').value.trim();
    const min = Math.max(1, parseInt(document.getElementById('newStepMin').value) || 5);
    if (!name) return;
    state.steps.push({ id: uid(), name, minutes: min });
    document.getElementById('newStepName').value = '';
    persist(); buildStepList();
  });
  document.getElementById('newStepName').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btnAddStep').click();
  });
  document.getElementById('btnResetDefault').addEventListener('click', () => {
    if (confirm(lang === 'ru' ? 'Загрузить шаги по умолчанию?' : 'Load default steps?')) {
      state.steps = defaultSteps(); persist(); buildStepList();
    }
  });

  /* Run */
  document.getElementById('btnStart').addEventListener('click', startRitual);

  function startRitual() {
    if (!state.steps.length) return;
    bell();
    runState = {
      stepIdx: 0,
      remaining: state.steps[0].minutes * 60,
      total: state.steps[0].minutes * 60,
      paused: false,
      stepsCompleted: 0,
      startTime: Date.now(),
      interval: null
    };
    showMode('run');
    updateRunUI();
    runState.interval = setInterval(tick, 250);
  }

  function tick() {
    if (runState.paused) return;
    runState.remaining -= 0.25;
    if (runState.remaining <= 0) nextStep();
    else updateRunUI();
  }

  function nextStep() {
    runState.stepsCompleted++;
    const next = runState.stepIdx + 1;
    if (next >= state.steps.length) {
      finishRitual();
    } else {
      bell();
      runState.stepIdx = next;
      runState.remaining = state.steps[next].minutes * 60;
      runState.total = state.steps[next].minutes * 60;
      updateRunUI();
    }
  }

  function updateRunUI() {
    const tr = t();
    const idx = runState.stepIdx;
    const step = state.steps[idx];
    const rem = Math.max(0, Math.ceil(runState.remaining));
    const mm = String(Math.floor(rem / 60)).padStart(2, '0');
    const ss = String(rem % 60).padStart(2, '0');
    document.getElementById('runLabel').textContent = tr.runLabel(idx + 1, state.steps.length);
    document.getElementById('runStepName').textContent = step.name;
    const timerEl = document.getElementById('runTimer');
    timerEl.textContent = mm + ':' + ss;
    timerEl.className = 'run-timer' + (rem <= 10 ? ' ending' : '');
    const pct = (1 - runState.remaining / runState.total) * 100;
    document.getElementById('runFill').style.width = Math.min(100, pct) + '%';
    // Mini steps
    const miniEl = document.getElementById('runMini');
    miniEl.innerHTML = state.steps.map((s, i) =>
      `<div class="mini-step ${i < idx ? 'done' : i === idx ? 'active' : ''}" title="${escHtml(s.name)}">${i+1}</div>`
    ).join('');
    document.getElementById('btnPause').textContent = runState.paused ? tr.resume : tr.pause;
  }

  document.getElementById('btnPause').addEventListener('click', () => {
    runState.paused = !runState.paused;
    document.getElementById('btnPause').textContent = runState.paused ? t().resume : t().pause;
  });
  document.getElementById('btnSkip').addEventListener('click', () => {
    if (!runState) return;
    runState.remaining = 0;
  });
  document.getElementById('btnAbort').addEventListener('click', () => {
    if (!confirm(lang === 'ru' ? 'Прервать ритуал?' : 'Abort ritual?')) return;
    stopInterval();
    showMode('builder');
  });

  function stopInterval() {
    if (runState && runState.interval) clearInterval(runState.interval);
  }

  function finishRitual() {
    stopInterval();
    bell(); setTimeout(bell, 600);
    const elapsed = Math.round((Date.now() - runState.startTime) / 60000);
    const today = dateKey(new Date());
    state.history[today] = (state.history[today] || 0) + 1;
    persist();
    showDone(runState.stepsCompleted, elapsed);
    runState = null;
  }

  function showDone(steps, mins) {
    const tr = t();
    document.getElementById('doneTitle').textContent = tr.doneTitle;
    document.getElementById('doneSub').textContent = tr.doneSub;
    document.getElementById('btnRunAgain').textContent = tr.runAgain;
    document.getElementById('btnBackBuilder').textContent = tr.backBuilder;
    document.getElementById('doneSummary').innerHTML = `
      <div class="done-chip"><div class="dv">${steps}</div><div class="dl">${tr.doneSteps}</div></div>
      <div class="done-chip"><div class="dv">${mins}</div><div class="dl">${tr.doneTime}</div></div>
    `;
    buildHistory();
    showMode('done');
  }

  function buildHistory() {
    const el = document.getElementById('historyRow');
    document.getElementById('lHistory').textContent = t().lHistory;
    const dots = [];
    const today = dateKey(new Date());
    for (let i = 13; i >= 0; i--) {
      const d = new Date(); d.setDate(d.getDate() - i);
      const k = dateKey(d);
      const done = !!state.history[k];
      const isToday = k === today;
      dots.push(`<div class="history-dot ${done ? 'done-day' : ''} ${isToday ? 'today' : ''}" title="${k}">${done ? '✓' : ''}</div>`);
    }
    el.innerHTML = dots.join('');
  }

  document.getElementById('btnRunAgain').addEventListener('click', startRitual);
  document.getElementById('btnBackBuilder').addEventListener('click', () => showMode('builder'));

  function showMode(mode) {
    document.getElementById('builderMode').style.display = mode === 'builder' ? '' : 'none';
    document.getElementById('runMode').style.display = mode === 'run' ? '' : 'none';
    document.getElementById('doneMode').style.display = mode === 'done' ? '' : 'none';
    if (mode === 'builder') { buildChips(); buildStepList(); }
    if (mode === 'run') {
      const tr = t();
      document.getElementById('btnPause').textContent = tr.pause;
      document.getElementById('btnSkip').textContent = tr.skip;
      document.getElementById('btnAbort').textContent = tr.abort;
    }
  }

  /* Lang */
  document.getElementById('bRu').addEventListener('click', () => { lang = 'ru'; localStorage.setItem(LK, lang); render(); });
  document.getElementById('bEn').addEventListener('click', () => { lang = 'en'; localStorage.setItem(LK, lang); render(); });

  function render() {
    document.getElementById('bRu').classList.toggle('on', lang === 'ru');
    document.getElementById('bEn').classList.toggle('on', lang === 'en');
    const tr = t();
    document.getElementById('headTitle').textContent = tr.title;
    document.getElementById('headSub').textContent = tr.sub;
    document.getElementById('lSteps').textContent = tr.lSteps;
    document.getElementById('newStepName').placeholder = tr.placeholder;
    document.getElementById('btnResetDefault').textContent = tr.resetDefault;
    document.getElementById('btnStart').textContent = tr.start;
    buildChips();
    buildStepList();
  }

  render();
})();
</script>
</body>
</html>
